name: Codex Skill Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - '.agents/**'
      - 'skills/**'
      - 'README.md'
      - 'scripts/quality/check_codex_distribution.py'
      - 'scripts/quality/test_codex_distribution.py'
      - '.github/workflows/codex-skill-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-surface:
    name: Codex Distribution Surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python3 -m pip install -r requirements.txt

      - name: Run Codex distribution unit tests
        run: |
          python3 -m unittest scripts/quality/test_codex_distribution.py

      - name: Validate Codex distribution surface
        run: |
          python3 scripts/quality/check_codex_distribution.py
