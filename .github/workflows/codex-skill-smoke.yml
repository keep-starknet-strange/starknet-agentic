name: Codex Skill Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - '.agents/**'
      - 'skills/**'
      - 'README.md'
      - 'scripts/quality/check_codex_distribution.py'
      - 'scripts/quality/check_cairo_auditor_release_hygiene.py'
      - 'scripts/quality/test_codex_distribution.py'
      - 'scripts/quality/test_cairo_auditor_release_hygiene.py'
      - '.github/workflows/codex-skill-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-surface:
    name: Codex Distribution Surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python3 -m pip install -r requirements.txt

      - name: Run Codex distribution unit tests
        run: |
          python3 -m unittest scripts/quality/test_codex_distribution.py
          python3 -m unittest scripts/quality/test_cairo_auditor_release_hygiene.py

      - name: Validate Codex distribution surface
        run: |
          python3 scripts/quality/check_codex_distribution.py

      - name: Validate cairo-auditor release hygiene (when VERSION changes)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No usable base SHA for diff; release hygiene gate skipped."
            exit 0
          fi
          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "Base SHA missing locally, attempting fetch: $BASE_SHA"
            if ! git fetch --no-tags --depth=1 origin "$BASE_SHA"; then
              echo "Unable to fetch base SHA; release hygiene gate skipped."
              exit 0
            fi
          fi
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx 'skills/cairo-auditor/VERSION'; then
            python3 scripts/quality/check_cairo_auditor_release_hygiene.py --enforce
          else
            echo "skills/cairo-auditor/VERSION unchanged; release hygiene gate skipped."
          fi
