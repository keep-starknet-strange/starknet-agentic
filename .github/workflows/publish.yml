# Manual / emergency publish path.
# Primary release flow is Changesets (see release.yml).
# This workflow fires when a GitHub Release is created manually and
# publishes with SLSA build-provenance attestation.
name: Publish Packages (manual)

on:
  release:
    types: [created]

concurrency:
  group: publish-manual-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup pnpm
        uses: pnpm/action-setup@53751a9789c7351e4924f01fe68370252a4f1f18
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Pack publish artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cd packages/starknet-mcp-server && npm pack --pack-destination ../../dist-release
          cd ../starknet-a2a && npm pack --pack-destination ../../dist-release
          cd ../starknet-agent-passport && npm pack --pack-destination ../../dist-release

      - name: Generate release checksums
        run: |
          set -euo pipefail
          shopt -s failglob
          cd dist-release
          sha256sum *.tgz > checksums.txt

      - name: Preflight release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if ! existing_assets="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' 2>&1)"; then
            echo "ERROR: Could not query release '$RELEASE_TAG'. gh output: $existing_assets"
            exit 1
          fi
          if ! [[ "$existing_assets" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Unexpected release assets response for '$RELEASE_TAG': $existing_assets"
            exit 1
          fi
          if [ "$existing_assets" -gt 0 ]; then
            echo "Release $RELEASE_TAG already has assets. Aborting to prevent attestation mismatch."
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist-release/*.tgz
            dist-release/checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist-release/*.tgz dist-release/checksums.txt

      - name: Publish to npm
        run: |
          cd packages/starknet-mcp-server
          npm publish --provenance --access public
          cd ../starknet-a2a
          npm publish --provenance --access public
          cd ../starknet-agent-passport
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
