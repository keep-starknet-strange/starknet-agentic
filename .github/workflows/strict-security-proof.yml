name: Strict Security Proof Gate

on:
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to secure-defi artifact JSON (repo-relative)"
        required: false
        default: "examples/secure-defi-demo/test/fixtures/strict-claims-pass.json"
  push:
    tags:
      - "v*"
      - "release-*"

permissions:
  contents: read

jobs:
  strict-proof-gate:
    name: Strict Security Proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify strict claims artifact
        env:
          STRICT_ARTIFACT_PATH: ${{ github.event.inputs.artifact_path || 'examples/secure-defi-demo/test/fixtures/strict-claims-pass.json' }}
        run: |
          set -euo pipefail
          if [ ! -f "$STRICT_ARTIFACT_PATH" ]; then
            echo "Artifact file not found: $STRICT_ARTIFACT_PATH"
            exit 1
          fi
          node scripts/security/verify-secure-defi-claims.mjs --artifact "$STRICT_ARTIFACT_PATH" --require-strict
