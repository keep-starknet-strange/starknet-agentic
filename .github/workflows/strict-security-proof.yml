name: Strict Security Proof Gate

on:
  workflow_dispatch:
    inputs:
      artifact_path:
        description: "Path to secure-defi artifact JSON (repo-relative)"
        required: false
        default: "examples/secure-defi-demo/test/fixtures/strict-claims-pass.json"
      manifest_path:
        description: "Optional path to artifact-manifest.json (repo-relative)"
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "release-*"

permissions:
  contents: read

jobs:
  strict-proof-gate:
    name: Strict Security Proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run evidence/proof validator unit tests
        run: |
          set -euo pipefail
          node --test scripts/security/verify-secure-defi-claims.test.mjs
          node --test scripts/security/evidence-manifest.test.mjs

      - name: Verify strict claims artifact
        env:
          ARTIFACT_PATH: ${{ github.event.inputs.artifact_path || 'examples/secure-defi-demo/test/fixtures/strict-claims-pass.json' }}
          MANIFEST_PATH: ${{ github.event.inputs.manifest_path || '' }}
        run: |
          set -euo pipefail
          if [ ! -f "$ARTIFACT_PATH" ]; then
            echo "Artifact file not found: $ARTIFACT_PATH"
            exit 1
          fi
          node scripts/security/verify-secure-defi-claims.mjs --artifact "$ARTIFACT_PATH" --require-strict
          if [ -n "$MANIFEST_PATH" ]; then
            if [ ! -f "$MANIFEST_PATH" ]; then
              echo "Manifest file not found: $MANIFEST_PATH"
              exit 1
            fi
            node scripts/security/evidence-manifest.mjs --manifest "$MANIFEST_PATH" --require-strict
          fi
